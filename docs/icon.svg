  <!-- WC letters -->
  <text x="256" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="196" font-weight="800" fill="#f0f4f8" text-anchor="middle" dominant-baseline="middle" letter-spacing="-6">WC</text>
  <!-- 2026 subtitle -->
  <text x="256" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="68" font-weight="600" fill="#2d9e4e" text-anchor="middle" dominant-baseline="middle" letter-spacing="8">2026</text>
  <!-- Lime accent bar bottom -->
